# ============================================================================
#  tester.conf  —  42 공식 ./tester 바이너리 채점용 설정
# ----------------------------------------------------------------------------
#  tester 가 요구하는 구성:
#   - "/"        : GET 만 허용
#   - ".bla"     : POST 시 CGI(cgi_tester)로 처리
#   - "/post_body": POST 허용, 본문 최대 100바이트
#   - "/directory": GET, root 는 YoupiBanane, 기본파일 youpi.bad_extension
#
#  주의: cgi 인터프리터 경로는 '절대경로'여야 합니다(CGI 실행 시 스크립트
#        폴더로 chdir 하므로 상대경로로는 못 찾음). 이 경로는 이 PC 기준입니다.
# ============================================================================

server {
    listen      8080;
    host        127.0.0.1;
    server_name localhost;

    client_max_body_size 200M;      # tester 가 100MB POST 를 CGI 로 보냄 → 넉넉히

    error_page 404 /errors/404.html;

    # "/" 는 GET 만.
    location / {
        root      www;
        methods   GET;
        index     index.html;
        autoindex off;
    }

    # POST 전용, 본문 최대 100바이트.
    location /post_body {
        root                 www;
        methods              POST;
        client_max_body_size 100;
    }

    # YoupiBanane 디렉터리 서빙 + .bla CGI(cgi_tester).
    location /directory {
        root      YoupiBanane;
        methods   GET POST;
        index     youpi.bad_extension;
        autoindex off;
        cgi       .bla /mnt/c/Users/manso/OneDrive/Desktop/ByClaudeCode/web_serve/cgi_tester;
    }
}
