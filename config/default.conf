# ============================================================================
#  default.conf  —  Webserv 예시 설정 파일
# ----------------------------------------------------------------------------
#  형식은 NGINX의 'server' 블록에서 영감을 받았습니다.
#  - '#' 으로 시작하는 줄은 주석입니다.
#  - 각 지시어(directive)는 세미콜론(;) 으로 끝납니다.
#  - 블록은 중괄호 { } 로 묶습니다.
#
#  이 파일 하나로 "서버가 어떻게 동작할지"를 전부 결정합니다.
#  코드를 바꾸지 않고 이 파일만 고쳐도 동작이 달라지는 것이 핵심입니다.
# ============================================================================

# ---- 첫 번째 가상 서버: 8080 포트에서 일반 웹사이트 제공 ----
server {
    listen              8080;            # 이 포트로 들어오는 연결을 받음
    host                127.0.0.1;       # 바인딩할 IP (0.0.0.0 이면 모든 인터페이스)
    server_name         localhost;       # 이 서버의 이름(가상 호스트용, 선택)

    # 클라이언트가 보낼 수 있는 요청 본문(body)의 최대 크기.
    # 이보다 크면 413(Payload Too Large)로 거절 → 메모리 고갈/공격 방지.
    client_max_body_size 10M;

    # 상태코드별 기본 에러 페이지. 지정이 없으면 서버 내장 페이지를 씁니다.
    error_page 404         /errors/404.html;
    error_page 500 502 503 /errors/50x.html;

    # ---- 라우트(location): URL 경로별 규칙 ----
    # '/' 는 가장 기본 경로. 더 구체적인 location이 우선 매칭됩니다.
    location / {
        root        www;                 # 이 경로의 파일을 찾을 실제 폴더
        index       index.html;          # 디렉터리 요청 시 기본으로 보여줄 파일
        methods     GET;                 # 허용 메서드 (이 경로는 읽기 전용)
        autoindex   off;                 # 디렉터리 목록 자동 표시 끔
    }

    # 업로드/삭제가 가능한 경로
    #  root 와 upload_store 를 같은 폴더로 맞춥니다. 그래야 POST 로 올린 파일을
    #  GET 으로 받고 DELETE 로 지우는 경로가 서로 일치합니다.
    location /upload {
        root         www/upload;
        methods      GET POST DELETE;     # 올리기(POST)/지우기(DELETE) 허용
        upload_store www/upload;          # 업로드된 파일을 저장할 폴더
        autoindex    on;                  # 올라간 파일 목록을 볼 수 있게
    }

    # CGI 실행 경로: 확장자에 따라 외부 프로그램으로 요청을 처리
    location /cgi-bin {
        root     www/cgi-bin;             # 스크립트들이 모여 있는 폴더
        methods  GET POST;
        cgi      .py  /usr/bin/python3;   # .py 요청은 python3 로 실행
    }

    # HTTP 리다이렉션 예시: /old 로 오면 /new 로 301 이동
    location /old {
        return 301 /new;
    }
}

# ---- 두 번째 가상 서버: 9090 포트에서 다른 컨텐츠 제공(멀티 포트 데모) ----
server {
    listen       9090;
    host         127.0.0.1;
    server_name  second;

    location / {
        root      www/second;
        index     index.html;
        methods   GET;
        autoindex on;
    }
}
